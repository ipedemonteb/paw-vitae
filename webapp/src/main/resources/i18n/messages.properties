about.story.subtitle=How a group of ITBA students created a platform to revolutionize healthcare access
about.story.image.alt=Vitae founding team
about.story.paragraph1=Vitae was born in 2025 at the Instituto Tecnológico de Buenos Aires (ITBA) when a group of passionate engineering students identified a critical gap in healthcare accessibility in Latin America.
about.story.paragraph2=What started as a university project for the Programming of Web Applications (PAW) course quickly evolved into a comprehensive platform with a mission to connect patients with healthcare providers seamlessly and efficiently.
about.story.paragraph3=Our team of dedicated professionals works tirelessly to improve the platform and expand our services to reach more communities, driven by our commitment to innovation, accessibility, and quality healthcare for all.

