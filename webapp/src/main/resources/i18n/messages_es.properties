# Our Story Section
about.story.tag=Nuestra Historia
about.story.title=El Viaje de Vitae
about.story.subtitle=Cómo un grupo de estudiantes del ITBA creó una plataforma para revolucionar el acceso a la salud
about.story.image.alt=Equipo fundador de Vitae
about.story.paragraph1=Vitae nació en 2025 en el Instituto Tecnológico de Buenos Aires (ITBA) cuando un grupo de estudiantes de ingeniería apasionados identificó una brecha crítica en la accesibilidad a la salud en América Latina.
about.story.paragraph2=Lo que comenzó como un proyecto universitario para el curso de Programación de Aplicaciones Web (PAW) rápidamente evolucionó a una plataforma integral con la misión de conectar pacientes con proveedores de salud de manera fluida y eficiente.
about.story.paragraph3=Nuestro equipo de profesionales dedicados trabaja incansablemente para mejorar la plataforma y expandir nuestros servicios para llegar a más comunidades, impulsados por nuestro compromiso con la innovación, la accesibilidad y la atención médica de calidad para todos.

# Our Mission Section
about.mission.tag=Nuestra Misión
about.mission.title=Lo Que Nos Impulsa
about.mission.subtitle=Nuestra misión central y los valores que guían nuestro trabajo cada día
about.mission.accessibility.title=Accesibilidad
about.mission.accessibility.text=Creemos que la atención médica debe ser accesible para todos, independientemente de su ubicación o situación socioeconómica. Nuestra plataforma elimina las barreras a la atención médica de calidad.
about.mission.quality.title=Atención de Calidad
about.mission.quality.text=Estamos comprometidos a conectar pacientes con proveedores de salud verificados y de alta calidad que brindan atención y servicio excepcionales.
about.mission.innovation.title=Innovación Continua
about.mission.innovation.text=Evolucionamos constantemente nuestra plataforma con tecnología de vanguardia para mejorar la experiencia de salud tanto para pacientes como para proveedores.

# Values Section
about.values.tag=Nuestros Valores
about.values.title=Los Principios Que Nos Guían
about.values.subtitle=Valores fundamentales que dan forma a nuestras decisiones e impulsan nuestra misión
about.values.care.title=Atención Centrada en el Paciente
about.values.care.text=Ponemos a los pacientes en primer lugar en todo lo que hacemos, asegurando que sus necesidades, preferencias y experiencias guíen el desarrollo de nuestra plataforma.
about.values.trust.title=Confianza y Seguridad
about.values.trust.text=Mantenemos los más altos estándares de seguridad y privacidad de datos, ganando la confianza tanto de pacientes como de proveedores de salud.
about.values.community.title=Impacto Comunitario
about.values.community.text=Nos esforzamos por hacer una diferencia positiva en las comunidades mejorando el acceso y los resultados de la atención médica.
about.values.innovation.title=Pensamiento Progresista
about.values.innovation.text=Abrazamos la innovación y buscamos continuamente nuevas formas de mejorar la prestación de servicios de salud a través de la tecnología.

